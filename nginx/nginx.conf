# ============================================================
# Mentora — Nginx Reverse Proxy Configuration
# Handles: static files, reverse proxy to backend, gzip,
#          security headers, rate limiting.
# ============================================================

# ─── Rate Limiting Zones ──────────────────────────────────────────────────
# General API: 60 requests/minute per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

# Auth endpoints: 10 requests/minute per IP (stricter)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# ─── Connection limit ─────────────────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;


server {
    listen 80;
    server_name _;   # Replace with your domain, e.g.: mentora.com www.mentora.com

    # Redirect HTTP → HTTPS in production (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    # ─── Security Headers ────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "DENY"             always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ─── Connection Limits ───────────────────────────────────────────────
    limit_conn conn_limit 20;

    # Hide Nginx version
    server_tokens off;

    # ─── Gzip Compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # ─── Frontend (React static build) ───────────────────────────────────
    location / {
        proxy_pass http://frontend:80;
        include /etc/nginx/proxy_params;
    }

    # ─── Auth API (stricter rate limit) ──────────────────────────────────
    location ~ ^/api/auth/(login|signup) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        include /etc/nginx/proxy_params;
    }

    # ─── Backend API ─────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        include /etc/nginx/proxy_params;
    }

    # ─── Health Check (no rate limit, no logging) ─────────────────────────
    location /health {
        proxy_pass http://backend:8000;
        access_log off;
        include /etc/nginx/proxy_params;
    }

    # ─── Block sensitive paths ────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ ^/(docs|redoc|openapi\.json) {
        deny all;
        return 404;
    }

    # ─── Custom error pages ───────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"Too many requests. Please slow down.","status_code":429}';
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        default_type application/json;
        return 502 '{"error":"Service temporarily unavailable.","status_code":502}';
    }
}


# ─── Shared proxy params (referenced above) ───────────────────────────────
# Save as /etc/nginx/proxy_params or inline below:
