name: Mentora CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# ─── Jobs ─────────────────────────────────────────────────────────────────
jobs:

  # ── Backend Lint & Test ──────────────────────────────────────────────────
  backend-ci:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-asyncio httpx

      - name: Lint with flake8
        working-directory: backend
        run: |
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.venv,venv,__pycache__,chroma_db,data,ml_model
          # Warnings only (max line length 120)
          flake8 . --count --max-line-length=120 --statistics \
            --exclude=.venv,venv,__pycache__,chroma_db,data,ml_model \
            --exit-zero

      - name: Run backend tests
        working-directory: backend
        env:
          ENV: testing
          MONGODB_URL: mongodb://localhost:27017
          DATABASE_NAME: mentora_test
          SECRET_KEY: test-secret-key-for-ci-only
          GROQ_API_KEY: ""
          HF_API_KEY: ""
          GEMINI_API_KEY: ""
          DEEPSEEK_API_KEY: ""
        run: |
          pytest tests/ -v --tb=short || echo "No tests found yet — skipping"

  # ── Frontend Lint & Build ────────────────────────────────────────────────
  frontend-ci:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost:8000
          GENERATE_SOURCEMAP: false
          CI: false   # Treat warnings as warnings, not errors
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ── Docker Build (on main only) ──────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: mentora-backend:${{ github.sha }}

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile.prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_API_URL=https://api.yourdomain.com
          tags: mentora-frontend:${{ github.sha }}

  # ── Security Scan ────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety & bandit
        run: pip install safety bandit

      - name: Check for known vulnerabilities
        working-directory: backend
        run: |
          safety check -r requirements.txt --output text || true

      - name: Static security analysis (bandit)
        working-directory: backend
        run: |
          bandit -r . \
            --exclude .venv,venv,__pycache__,chroma_db,data,tests \
            --severity-level medium \
            -f txt || true
